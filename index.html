<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pictionary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #FFFEF9;
            --bg-canvas: #FFFFFF;
            --accent-primary: #FF6B9D;
            --accent-secondary: #4ECDC4;
            --accent-tertiary: #FFE66D;
            --text-dark: #2D3142;
            --text-light: #6B7280;
            --border-color: #E5E7EB;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-main);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .sketch-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: 0;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, var(--text-dark) 35px, var(--text-dark) 36px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, var(--text-dark) 35px, var(--text-dark) 36px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 4.5rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 0.5rem;
            text-shadow: 3px 3px 0 var(--accent-tertiary);
            letter-spacing: 2px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .draw-section {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            border: 3px solid var(--text-dark);
            position: relative;
        }

        .draw-section::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 20px;
            right: 20px;
            height: 6px;
            background: var(--accent-tertiary);
            border-radius: 3px 3px 0 0;
        }

        .prompt-area {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
            border-radius: 16px;
            color: white;
        }

        .prompt-text {
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .timer {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
        }

        .canvas-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }

        canvas {
            border: 3px dashed var(--border-color);
            border-radius: 12px;
            cursor: crosshair;
            background: var(--bg-canvas);
            display: block;
            width: 100%;
            touch-action: none;
        }

        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 0.9rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: 3px solid var(--text-dark);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 4px 4px 0 var(--text-dark);
            position: relative;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--text-dark);
        }

        .btn-primary { background: var(--accent-primary); color: white; }
        .btn-secondary { background: var(--accent-secondary); color: white; }
        .btn-clear { background: white; color: var(--text-dark); }

        button:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--text-dark);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 2px solid var(--border-color);
        }

        .panel-title {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--accent-primary);
        }

        .prediction-list { list-style: none; }

        .prediction-item {
            padding: 0.8rem;
            margin-bottom: 0.5rem;
            background: var(--bg-main);
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .prediction-item:hover {
            border-color: var(--accent-secondary);
            transform: translateX(4px);
        }

        .prediction-name {
            font-weight: 600;
            color: var(--text-dark);
            text-transform: capitalize;
        }

        .confidence-bar {
            flex: 1;
            margin: 0 1rem;
            height: 8px;
            background: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary));
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .confidence-value {
            font-weight: 700;
            color: var(--accent-primary);
            min-width: 45px;
            text-align: right;
        }

        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
            h1 { font-size: 3rem; }
        }

        .doodle {
            position: absolute;
            opacity: 0.1;
            pointer-events: none;
        }

        .doodle-star {
            top: 10%;
            right: 5%;
            font-size: 3rem;
            animation: spin 20s linear infinite;
        }

        .doodle-heart {
            bottom: 15%;
            left: 3%;
            font-size: 2.5rem;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="sketch-bg"></div>
    <div class="doodle doodle-star">⭐</div>
    <div class="doodle doodle-heart">❤️</div>
    
    <div class="container">
        <header>
            <h1>AI Pictionary</h1>
        </header>

        <div class="main-grid">
            <div class="draw-section">
                <div class="prompt-area">
                    <div class="prompt-text">Draw: <span id="currentPrompt" style="text-transform: capitalize;">Loading...</span></div>
                    <div class="timer" id="timer">30s</div>
                </div>

                <div class="canvas-wrapper">
                    <canvas id="drawCanvas" width="600" height="600"></canvas>
                </div>

                <div class="controls">
                    <button class="btn-clear" id="clearBtn">Clear ✏️</button>
                    <button class="btn-secondary" id="newPromptBtn">New Prompt 🎲</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <h3 class="panel-title">AI Predictions</h3>
                    <ul class="prediction-list" id="predictions">
                        <li class="prediction-item">
                            <span class="prediction-name">Start drawing...</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
